<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPT Token Extractor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>GPT Token Extractor</h1>
      <p class="subtitle">输入 OpenAI 账号凭据，自动提取 Codex OAuth Token</p>
    </header>

    <div id="login-overlay" class="overlay" style="display:none">
      <div class="box">
        <h2>登录</h2>
        <form id="login-form">
          <input type="password" id="login-password" placeholder="管理密码" autocomplete="current-password" autofocus>
          <button type="submit">登录</button>
        </form>
        <div id="login-error" class="error" hidden>密码错误</div>
      </div>
    </div>

    <div id="code-overlay" class="overlay" style="display:none">
      <div class="box">
        <h2>输入验证码</h2>
        <p style="color:#999;font-size:0.85rem;margin-bottom:12px">验证码已发送到邮箱，请查收</p>
        <form id="code-form">
          <input type="text" id="code-input" placeholder="请输入6位验证码" maxlength="6" autocomplete="off" autofocus>
          <button type="submit">提交</button>
        </form>
        <div id="code-error" class="error" hidden>提交失败</div>
      </div>
    </div>

    <section id="input-section" class="card">
      <h2>提取 Token</h2>
      <form id="extract-form">
        <div class="form-group">
          <label for="email">OpenAI 邮箱 <span class="required">*</span></label>
          <input type="email" id="email" placeholder="user@example.com" required>
        </div>
        <button type="submit" id="submit-btn" class="btn-primary">开始提取</button>
      </form>
    </section>

    <section id="progress-section" class="card" hidden>
      <h2>提取进度</h2>
      <div class="progress-bar">
        <div id="progress-fill" class="progress-fill" style="width: 0%"></div>
      </div>
      <p id="progress-step">等待开始...</p>
      <div id="log-container" class="log-container"></div>
      <button id="stop-btn" class="btn-danger" hidden>取消</button>
    </section>

    <section id="result-section" class="card" hidden>
      <h2>提取成功</h2>
      <div class="result-info">
        <span id="result-email"></span>
        <span id="result-account"></span>
      </div>
      <div class="result-actions">
        <button id="copy-json-btn" class="btn-primary">复制 JSON</button>
        <a id="download-btn" class="btn-secondary" download>下载 JSON</a>
        <button id="upload-cpa-btn" class="btn-primary btn-cpa">上传到 CPA</button>
        <button id="delete-btn" class="btn-danger">删除凭证</button>
      </div>
      <pre id="json-preview" class="json-preview"></pre>
    </section>

    <section id="history-section" class="card">
      <h2>提取历史</h2>
      <div id="history-list" class="history-list">
        <p class="empty">暂无记录</p>
      </div>
    </section>

    <section id="cpa-section" class="card">
      <h2>CPA 上传配置</h2>
      <form id="cpa-form">
        <div class="form-group">
          <label for="cpa-url">CPA 后端地址 <span class="optional">如 https://cpa.example.com</span></label>
          <input type="url" id="cpa-url" placeholder="https://cpa.example.com">
        </div>
        <div class="form-group">
          <label for="cpa-key">Management Key</label>
          <input type="text" id="cpa-key" placeholder="只需填 Key，不需要 Bearer 前缀">
        </div>
        <div class="form-group cpa-toggle-row">
          <label class="toggle-label">
            <input type="checkbox" id="cpa-auto">
            <span>提取后自动上传</span>
          </label>
        </div>
        <div class="cpa-actions">
          <button type="submit" class="btn-primary">保存配置</button>
          <button type="button" id="cpa-test-btn" class="btn-secondary">测试连接</button>
          <button type="button" id="cpa-upload-all-btn" class="btn-secondary btn-cpa">一键上传全部</button>
        </div>
      </form>
      <div id="cpa-status" class="cpa-status" hidden></div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
